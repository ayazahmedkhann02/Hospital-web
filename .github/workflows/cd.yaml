name: Hospital CD

on:
  workflow_run:
    workflows:
      - Hospital CI
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-2

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
          --region ap-south-2 \
          --name YOUR_EKS_CLUSTER_NAME

      - name: Deploy Frontend
        run: |
          kubectl set image deployment/hospital-frontend \
          frontend=${{ secrets.DOCKER_USERNAME }}/hospital-frontend:${{ github.event.workflow_run.head_sha }} \
          -n hospital-app

      - name: Deploy Backend
        run: |
          kubectl set image deployment/hospital-backend \
          backend=${{ secrets.DOCKER_USERNAME }}/hospital-backend:${{ github.event.workflow_run.head_sha }} \
          -n hospital-app

      - name: Deploy Notification
        run: |
          kubectl set image deployment/hospital-notification \
          notification=${{ secrets.DOCKER_USERNAME }}/hospital-notification:${{ github.event.workflow_run.head_sha }} \
          -n hospital-app

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/hospital-frontend -n hospital-app
          kubectl rollout status deployment/hospital-backend -n hospital-app
          kubectl rollout status deployment/hospital-notification -n hospital-app