name: Hospital Multi-Service CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. SonarQube Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=hospital-project

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 4. Build Frontend Image
      - name: Build Frontend
        run: |
          docker build -t ayazahmedkhann02/hospital-frontend:latest ./frontend

      # 5. Build Backend Image
      - name: Build Backend
        run: |
          docker build -t ayazahmedkhann02/hospital-backend:latest ./backend

      # 6. Build Notification Image
      - name: Build Notification
        run: |
          docker build -t ayazahmedkhann02/hospital-notification:latest ./notification-service

      # 7. Push Frontend
      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-frontend:latest

      # 8. Push Backend
      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-backend:latest

      # 9. Push Notification
      - name: Push Notification
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hospital-notification-service:latest
