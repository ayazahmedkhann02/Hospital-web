name: Hospital CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=hospital-project

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" \
          --password-stdin

      - name: Build Frontend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hospital-frontend:${{ github.sha }} \
          ./frontend

      - name: Build Backend
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hospital-backend:${{ github.sha }} \
          ./backend

      - name: Build Notification
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hospital-notification:${{ github.sha }} \
          ./notification-service

      - name: Push Frontend
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hospital-frontend:${{ github.sha }}

      - name: Push Backend
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hospital-backend:${{ github.sha }}

      - name: Push Notification
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hospital-notification:${{ github.sha }}